<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Chat Mobile</title>

<style>

/* ===== THEME ===== */

:root{
 --bg:#0f172a;
 --chat:#1e293b;
 --header:#2563eb;
 --text:white;
}

.light{
 --bg:#f1f5f9;
 --chat:#ffffff;
 --header:#3b82f6;
 --text:#111;
}

/* ===== BASE ===== */

html,body{
 margin:0;
 height:100%;
 font-family:Arial;
 background:var(--bg);
 overflow:hidden;
}

/* ===== CHAT ===== */

.chat{
 width:100%;
 height:100dvh;
 background:var(--chat);
 display:flex;
 flex-direction:column;
}

/* HEADER */

.header{
 background:var(--header);
 padding:14px;
 color:white;
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-size:18px;
}

.menu-btn{
 font-size:22px;
 cursor:pointer;
}

/* MENU */

.menu{
 position:fixed;
 top:60px;
 right:10px;
 background:var(--chat);
 border-radius:12px;
 box-shadow:0 5px 20px rgba(0,0,0,.4);
 display:none;
 flex-direction:column;
 z-index:999;
}

.menu button{
 padding:14px;
 border:none;
 background:none;
 color:var(--text);
 text-align:left;
 font-size:16px;
}

.menu button:hover{
 background:rgba(0,0,0,.1);
}

/* MESSAGES */

.messages{
 flex:1;
 overflow-y:auto;
 padding:12px;
}

.message{
 display:flex;
 gap:10px;
 margin:12px 0;
}

.avatar{
 width:38px;
 height:38px;
 border-radius:50%;
}

.bubble{
 padding:12px;
 border-radius:14px;
 max-width:75%;
 color:white;
 font-size:15px;
}

.me .bubble{background:#22c55e;}
.other .bubble{background:#64748b;}

/* INPUT */

.input{
 display:flex;
 gap:8px;
 padding:8px;
 border-top:1px solid #444;
 position:sticky;
 bottom:0;
 background:var(--chat);
}

.input input{
 flex:1;
 padding:14px;
 border-radius:10px;
 border:none;
 outline:none;
 font-size:16px;
 background:rgba(0,0,0,.2);
 color:var(--text);
}

.send{
 background:var(--header);
 border:none;
 color:white;
 padding:14px 18px;
 border-radius:10px;
 font-size:16px;
}

/* LOGIN */

.login{
 width:100%;
 height:100dvh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:var(--chat);
}

.login input{
 padding:14px;
 width:80%;
 font-size:16px;
 margin-bottom:12px;
}

.avatars{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
}

.avatars img{
 width:70px;
 height:70px;
 margin:8px;
 border-radius:50%;
 border:3px solid transparent;
 cursor:pointer;
}

.selected{
 border:3px solid #22c55e !important;
}

button{
 cursor:pointer;
 touch-action:manipulation;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* ===== AVATARS ===== */

const avatars=[
"img/1.png",
"img/2.png",
"img/3.png",
"img/4.png"
];

let user=localStorage.getItem("chat_user");
let avatar=localStorage.getItem("chat_avatar");

const app=document.getElementById("app");

/* ===== THEME ===== */

function applyTheme(){
 if(localStorage.getItem("theme")==="light")
  document.body.classList.add("light");
}

function toggleTheme(){
 document.body.classList.toggle("light");
 localStorage.setItem(
   "theme",
   document.body.classList.contains("light")?"light":"dark"
 );
}

/* ===== LOGIN ===== */

function showLogin(){

app.innerHTML=`
<div class="login">
<h2>Entrar no Chat</h2>

<input id="name" placeholder="Seu nome">

<div class="avatars">
${avatars.map(a=>`
<img src="${a}" onclick="selectAvatar(this,'${a}')">
`).join("")}
</div>

<button onclick="startChat()">Entrar</button>
</div>
`;
}

let selectedAvatar=null;

function selectAvatar(el,src){
 document.querySelectorAll(".avatars img")
 .forEach(i=>i.classList.remove("selected"));

 el.classList.add("selected");
 selectedAvatar=src;
}

function startChat(){

const name=document.getElementById("name").value.trim();

if(!name || !selectedAvatar){
 alert("Digite nome e escolha avatar!");
 return;
}

localStorage.setItem("chat_user",name);
localStorage.setItem("chat_avatar",selectedAvatar);

user=name;
avatar=selectedAvatar;

showChat();
}

/* ===== CHAT UI ===== */

function showChat(){

app.innerHTML=`
<div class="chat">

<div class="header">
💬 Chat
<div class="menu-btn" onclick="toggleMenu()">⚙️</div>
</div>

<div id="menu" class="menu">
<button onclick="toggleTheme()">🌙 / ☀️ Tema</button>
<button onclick="clearData()">🗑 Excluir Dados</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Mensagem...">
<button class="send" onclick="send()">Enviar</button>
</div>

</div>
`;

initChat();
}

/* ===== MENU ===== */

function toggleMenu(){
const m=document.getElementById("menu");
m.style.display=m.style.display==="flex"?"none":"flex";
}

/* ===== STORAGE ===== */

function getMessages(){
 return JSON.parse(localStorage.getItem("chat_msgs"))||[];
}

function saveMessages(m){
 localStorage.setItem("chat_msgs",JSON.stringify(m));
}

/* ===== CHAT LOGIC ===== */

function initChat(){

const box=document.getElementById("messages");
const input=document.getElementById("msg");

window.render=function(){

 box.innerHTML="";

 getMessages().forEach(m=>{

  const div=document.createElement("div");
  div.className="message "+(m.user===user?"me":"other");

  div.innerHTML=`
  <img class="avatar" src="${m.avatar}">
  <div class="bubble">
  <b>${m.user}</b><br>${m.text}
  </div>
  `;

  box.appendChild(div);
 });

 box.scrollTop=box.scrollHeight;
};

window.send=function(){

 const text=input.value.trim();
 if(!text)return;

 const msgs=getMessages();

 msgs.push({
  user:user,
  avatar:avatar,
  text:text
 });

 saveMessages(msgs);

 input.value="";
 render();
};

input.addEventListener("keydown",e=>{
 if(e.key==="Enter")send();
});

window.addEventListener("storage",render);

render();
}

/* ===== CLEAR ===== */

function clearData(){
if(confirm("Excluir todos os dados do chat?")){
 localStorage.clear();
 location.reload();
}
}

/* ===== MOBILE KEYBOARD FIX ===== */

document.addEventListener("focusin",e=>{
 if(e.target.tagName==="INPUT"){
  setTimeout(()=>{
   window.scrollTo(0,document.body.scrollHeight);
  },300);
 }
});

/* ===== INIT ===== */

applyTheme();

if(user && avatar){
 showChat();
}else{
 showLogin();
}

</script>

</body>
</html>
